name: ✈ Alerta Diário de Passagens — SSA

on:
  schedule:
    # 7h da manhã horário de Brasília = 10h UTC
    - cron: "0 10 * * *"

  # Permite rodar manualmente pelo painel do GitHub
  workflow_dispatch:

jobs:
  send-flight-alert:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Instalar dependências
        run: pip install requests openpyxl

      - name: ✈ Rodar script de passagens
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python flight_alert.py
